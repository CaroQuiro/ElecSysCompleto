<div class="contenedor">
    <div class="Derecha">
        <div class="imagen-contenedor">
            <img class="portada-imagen" src="img/Elactricain.jpg" />
        </div>
    </div>
    <div class="Izquierda">
        <div class="logo">
            <img class="logo-vc" src="img/Logo-Original.png" />
        </div>
        <div class="formulario">
            <h1>CONECTATE</h1>
            <p>VC Eléctricos Construcciones SAS</p>

            <form *ngIf="!pasoVerificacion" (ngSubmit)="entrar()">
                <input type="email" name="correo" [(ngModel)]="loginData.correo" placeholder="Correo Electrónico" required />
                <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="Contraseña" required />
                
                <button type="submit" class="boton-login" [disabled]="cargando">
                    {{ cargando ? 'Enviando...' : 'Enviar Código' }}
                </button>
            </form>

            <form *ngIf="pasoVerificacion" (ngSubmit)="confirmarCodigo()">
                <p class="instruccion">Ingresa el código enviado a tu correo:</p>
                <input type="text" name="codigo" [(ngModel)]="codigoVerificacion" placeholder="Código de 6 dígitos" required />
                
                <button type="submit" class="boton-login" [disabled]="cargando">
                    {{ cargando ? 'Verificando...' : 'Verificar y Entrar' }}
                </button>
                
                <a class="regresar" (click)="pasoVerificacion = false">
                    <i class="fas fa-arrow-left"></i> Volver al inicio
                </a>
            </form>

            <div class="iconos">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-whatsapp"></i>
                <i class="fab fa-linkedin-in"></i>
            </div>
        </div>
    </div>
</div>
