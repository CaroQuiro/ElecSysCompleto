<app-header-usuarrio></app-header-usuarrio>
<div class="layout">
    <app-menu-vertical></app-menu-vertical>

    <div class="contenido" *ngIf="orden">
        <form #ordenForm="ngForm">
            <h1>Visualización de la Orden de Visita</h1>
            
            <p *ngIf="!esAdmin && (orden.estado === 'REALIZADA' || orden.estado === 'CANCELADA')" class="alerta-bloqueo">
                <i class="fas fa-lock"></i> Esta orden se encuentra <strong>{{orden.estado}}</strong>. Solo un administrador puede realizar cambios.
            </p>

            <div class="estado-cotizacion">
                <div>
                    <p class="titulo">Orden de Visita</p>
                    <h1 class="codigo">#{{ idOrden }}</h1>
                </div>

                <div class="selector-wrapper">
                    <label class="label-estado">Estado de la visita</label>
                    <select class="select-estado" [(ngModel)]="orden.estado" name="estadoOrden" [disabled]="!puedeEditar">
                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="PROGRAMADA">PROGRAMADA</option>
                        <option value="REALIZADA">REALIZADA</option>
                        <option value="CANCELADA">CANCELADA</option>
                    </select>
                </div>
            </div>

            <div class="card-section detalle-proyecto">
                <h2>Actividades a Realizar</h2>
                <div class="ref-group">
                    <label>Descripción General:</label>
                    <textarea class="input-full" [(ngModel)]="orden.descripcion" name="descripcionG" [disabled]="!puedeEditar"></textarea>
                </div>

                <table class="tabla-detalle">
                    <thead>
                        <tr>
                            <th>Actividad</th>
                            <th>Observaciones</th>
                            <th>Duración</th>
                            <th *ngIf="puedeEditar">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let d of editDetalles; let i = index">
                            <td><input type="text" [(ngModel)]="d.actividad" [disabled]="!d.editando || !puedeEditar" name="act{{i}}"></td>
                            <td><input type="text" [(ngModel)]="d.observaciones" [disabled]="!d.editando || !puedeEditar" name="obs{{i}}"></td>
                            <td><input type="text" [(ngModel)]="d.duracion" [disabled]="!d.editando || !puedeEditar" name="dur{{i}}"></td>
                            <td *ngIf="puedeEditar">
                                <ng-container *ngIf="!d.editando">
                                    <button type="button" (click)="editarFila(d)">✏️</button>
                                    <button type="button" class="btn-delete" (click)="eliminarFila(d, i)">🗑️</button>
                                </ng-container>
                                <ng-container *ngIf="d.editando">
                                    <button type="button" (click)="guardarFila(d)">💾</button>
                                    <button type="button" (click)="cancelarFila(d, i)">❌</button>
                                </ng-container>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <button *ngIf="puedeEditar" class="btn-add-task" type="button" (click)="agregarFila()">+ Agregar Actividad</button>
            </div>

            <div class="card-section">
                <div class="opciones-document">
                    <button *ngIf="puedeEditar" class="crear" type="button" (click)="actualizarOrdenCompleta()"> 
                        Actualizar Orden 
                    </button>
                    
                    <button class="enviar" type="button" (click)="enviarEmail()">Enviar Email</button>
                    <button class="descargar" type="button" style="filter: grayscale(0.5);">Descargar PDF</button>

                    <button *ngIf="esAdmin" class="descargar" type="button" (click)="borrarOrdenTotal()" style="background: #c3350e;"> 
                        Borrar Orden 
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
