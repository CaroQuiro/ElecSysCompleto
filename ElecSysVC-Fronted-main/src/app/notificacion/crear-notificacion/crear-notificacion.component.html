<app-header-usuarrio></app-header-usuarrio>

<div class="layout">
    <app-menu-vertical></app-menu-vertical>

    <div class="contenido">
        <div class="header-section">
            <h1>Programar Notificación</h1>
            <p>Configure el mensaje y seleccione los destinatarios activos</p>
        </div>

        <div class="card form-container">
            <div class="form-section">
                <h3>1. Información del Mensaje</h3>
                <div class="field">
                    <label>Título / Asunto</label>
                    <input type="text" [(ngModel)]="request.notificacion.titulo" placeholder="Ej: Mantenimiento Preventivo">
                </div>
                <div class="field">
                    <label>Mensaje</label>
                    <textarea [(ngModel)]="request.notificacion.mensaje" rows="4" placeholder="Escriba el contenido aquí..."></textarea>
                </div>
            </div>

            <div class="form-section">
                <h3>2. Configuración de Envío</h3>
                <div class="grid-inputs">
                    <div class="field">
                        <label>Tipo de Notificación</label>
                        <select [(ngModel)]="request.notificacion.tipo">
                            <option value="UNICA">Envío Único</option>
                            <option value="RECURRENTE">Programación Recurrente</option>
                        </select>
                    </div>

                    <div class="field" *ngIf="request.notificacion.tipo === 'RECURRENTE'">
                        <label>Frecuencia</label>
                        <select [(ngModel)]="request.frecuencia">
                            <option value="DIARIA">Diaria</option>
                            <option value="SEMANAL">Semanal</option>
                            <option value="MENSUAL">Mensual</option>
                            <option value="ANUAL">Anual</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Fecha y Hora de Inicio</label>
                        <input type="datetime-local" [(ngModel)]="request.fechaInicio">
                    </div>
                    </div>
            </div>

            <div class="form-section">
                <h3>3. Destinatarios</h3>
                <div class="field">
                    <label>Enviar a:</label>
                    <div class="toggle-group">
                        <button [class.active]="request.tipoDestinatario === 'CLIENTE'" 
                                (click)="cambiarTipoDestinatario('CLIENTE')">Clientes</button>
                        <button [class.active]="request.tipoDestinatario === 'TRABAJADOR'" 
                                (click)="cambiarTipoDestinatario('TRABAJADOR')">Trabajadores</button>
                    </div>
                </div>

                <div class="destinatarios-box">
                    <div class="destinatario-item" *ngFor="let item of destinatariosFiltrados">
                        <input type="checkbox" 
                               [id]="'d' + (item.id_cliente || item.idTrabajador)" 
                               (change)="toggleDestinatario(item.id_cliente || item.idTrabajador)">
                        <label [for]="'d' + (item.id_cliente || item.idTrabajador)">
                            {{item.nombre}} {{item.apellido || ''}} — <small>{{item.correo}}</small>
                        </label>
                    </div>
                    <div *ngIf="destinatariosFiltrados.length === 0" class="no-data">
                        No hay {{request.tipoDestinatario.toLowerCase()}}s activos disponibles.
                    </div>
                </div>
                <div class="selection-counter">
                    <strong>{{request.idsDestinatarios.length}}</strong> seleccionados
                </div>
            </div>

            <div class="form-actions">
                <button class="btn-cancel" (click)="cancelar()">Cancelar</button>
                <button class="btn-save" (click)="guardar()">Guardar y Programar</button>
            </div>
        </div>
    </div>
</div>
