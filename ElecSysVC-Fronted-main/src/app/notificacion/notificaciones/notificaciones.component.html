<app-header-usuarrio></app-header-usuarrio>

<div class="layout">
    <app-menu-vertical></app-menu-vertical>

    <div class="contenido">
        <div class="header-main">
            <div class="title-group">
                <h1>Gestión de Notificaciones</h1>
                <p><i class="fas fa-info-circle"></i> Monitoreo de envíos únicos y programaciones recurrentes</p>
            </div>
            <button class="btn-primary" (click)="irACrear()">
                <i class="fas fa-plus"></i> Nueva Programación
            </button>
        </div>

        <div class="filters-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" [(ngModel)]="filtroTitulo" placeholder="Buscar por título de notificación...">
            </div>
            <div class="select-box">
                <i class="fas fa-filter"></i>
                <select [(ngModel)]="filtroTipo">
                    <option value="">Todos los tipos</option>
                    <option value="UNICA">Única Vez</option>
                    <option value="RECURRENTE">Recurrente</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40%;">Título y Mensaje</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                        <th>Creación</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let n of notificacionesFiltradas" class="row-hover">
                        <td>
                            <div class="title-cell">
                                <span class="main-title">{{n.titulo}}</span>
                                <span class="sub-message">{{limpiarYFormatearMensaje(n.mensaje)}}</span>
                            </div>
                        </td>
                        <td>
                            <span class="tag" [ngClass]="n.tipo">
                                <i class="fas" [ngClass]="n.tipo === 'UNICA' ? 'fa-paper-plane' : 'fa-redo'"></i>
                                {{n.tipo}}
                            </span>
                        </td>
                        <td>
                            <span class="badge" [ngClass]="n.tipo === 'UNICA' ? 'enviado' : n.estado?.toLowerCase()">
                                <i class="fas fa-circle"></i>
                                {{ n.tipo === 'UNICA' ? 'ENVIADO' : n.estado }}
                            </span>
                        </td>
                        <td class="date-cell">{{n.fechaCreacion | date:'dd/MM/yyyy'}}</td>
                        <td class="actions">
                            <div class="action-container" *ngIf="n.tipo === 'RECURRENTE'; else sinAcciones">
                                <button class="btn-icon state" (click)="toggleEstado(n)" 
                                        [ngClass]="n.estado === 'ACTIVA' ? 'active' : 'paused'"
                                        [title]="n.estado === 'ACTIVA' ? 'Pausar' : 'Activar'">
                                    <i class="fas" [ngClass]="n.estado === 'ACTIVA' ? 'fa-pause' : 'fa-play'"></i>
                                </button>
                                <button class="btn-icon delete" (click)="eliminar(n.idNotificacion!)" title="Eliminar">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                            <ng-template #sinAcciones>
                                <div class="no-actions">
                                    <i class="fas fa-lock" title="Registro histórico"></i>
                                    <span>Histórico</span>
                                </div>
                            </ng-template>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
