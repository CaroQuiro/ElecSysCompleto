<app-header-usuarrio></app-header-usuarrio>

<div class="cuadro-contenido">
    <section class="intro">
        <h1 class="titulo">Panel de Control</h1>
        <p class="bienvenida">
            Bienvenido, <strong>{{ nombreUsuario }}</strong> a VC Eléctricos Construcciones S.A.S
        </p>
        <p>
            Gestiona los recursos de la empresa de manera eficiente desde tu perfil.
        </p>
    </section>

    <section class="seccion">
        <h2 class="izquierda">Cotizaciones</h2>
        <div class="sub_boton">
            <button class="card" (click)="CrearCotizacion()">
                <i class="fas fa-file-circle-plus"></i>
                <h3>Nueva Cotización</h3>
            </button>
            <button class="card" (click)="GestionCotizaciones()">
                <i class="fas fa-eye"></i>
                <h3>Ver Cotizaciones</h3>
            </button>
        </div>
    </section>

    <section class="seccion">
        <h2 class="derecha">Cuentas de Cobro</h2>
        <div class="sub_boton">
            <button class="card" (click)="CrearCuenta()">
                <i class="fas fa-file-invoice-dollar"></i>
                <h3>Nueva Cuenta</h3>
            </button>
            <button class="card" (click)="GestionCuentasPagar()">
                <i class="fas fa-eye"></i>
                <h3>Ver Cuentas</h3>
            </button>
        </div>
    </section>

    <section class="seccion">
        <h2 class="izquierda">Órdenes de Visita</h2>
        <div class="sub_boton">
            <button class="card" (click)="CrearVisita()">
                <i class="fas fa-calendar-plus"></i>
                <h3>Programar Visita</h3>
            </button>
            <button class="card" (click)="GestionVisitas()">
                <i class="fas fa-clipboard-list"></i>
                <h3>Ver Visitas</h3>
            </button>
        </div>
    </section>

    <section class="seccion">
        <h2 class="derecha">Órdenes de Trabajo</h2>
        <div class="sub_boton">
            <button class="card" (click)="CrearTrabajo()">
                <i class="fas fa-tools"></i>
                <h3>Nuevo Trabajo</h3>
            </button>
            <button class="card" (click)="GestionTrabajos()">
                <i class="fas fa-tasks"></i>
                <h3>Ver Trabajos</h3>
            </button>
        </div>
    </section>

    <section class="seccion" *ngIf="esAdmin">
        <h2 class="izquierda">Contratos</h2>
        <div class="sub_boton">
            <button class="card" (click)="CrearContrato()">
                <i class="fas fa-file-signature"></i>
                <h3>Nuevo Contrato</h3>
            </button>
            <button class="card" (click)="GestionarContratos()">
                <i class="fas fa-eye"></i>
                <h3>Ver Contratos</h3>
            </button>
        </div>
    </section>
</div>

<app-footer-usuario></app-footer-usuario>
